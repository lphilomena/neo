# Lightweight env: Python + pip only (no CUDA pytorch from conda).
# Recommended when disk/GPU stack is limited.

name: neoag-tools
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - libstdcxx-ng>=13
  - "setuptools>=65,<82"
  - samtools
  - bcftools
  - pip:
    - "pvactools>=6.1,<7"
    # pVACtools 6.1.x pins MHCflurry 2.0.6; keep the lite env resolver compatible.
    - mhcflurry==2.0.6
