# Splice-junction helper environment.
# pVACsplice itself is provided by pVACtools in neoag-tools; this env carries
# RegTools and optional lightweight Python helpers for splice-junction evidence.
name: neoag-splice
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - pip
  - regtools
  - samtools
  - tabix
  - bedtools
  - git
  - pip:
    - pandas
    - numpy
