# Conda + pip environment for neoag upstream tools.
# pVACtools: pip only (bioconda has legacy pvacseq 4.x only)
# VEP: optional heavy install — see conda/env.neoag-vep.yml

name: neoag-tools
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.11
  - pip
  - biopython
  - libstdcxx-ng>=13
  - sysroot_linux-64>=2.34
  - patchelf
  - "setuptools>=65,<82"
  - mhcflurry>=2.1
  - samtools
  - bcftools
  - tabix
  - pip:
    - "pvactools>=6.1,<7"
