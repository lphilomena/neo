# HCC1395 score-only: skip PRIME (slow single-core); use BigMHC_IM only.
[enabled_sources]
types = ["SNV", "InDel", "SV", "CNV", "Fusion", "Splice", "TAA"]
enforce_enabled_sources = false

[source_priority]
