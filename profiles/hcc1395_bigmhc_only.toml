[immunogenicity]
enabled = true
sources = ["bigmhc_im"]
composite = "weighted"
use_iedb_fallback = false

[immunogenicity.weights]
bigmhc_im = 1.0

[immune_escape]
therapy_context = "vaccine"
hla_loh_policy = "exclude_lost_hla_for_vaccine"
