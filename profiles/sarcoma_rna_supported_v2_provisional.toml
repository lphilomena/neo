[metadata]
status = "PROVISIONAL_RESEARCH_ONLY"
version = "2.0"
calibrated_for_clinical_use = false

[enabled_sources]
types = ["SNV", "InDel", "Fusion", "Splice", "TAA"]
[source_priority]
SNV = 1.00
InDel = 1.10
SV = 1.15
Fusion = 1.20
Splice = 1.00
TAA = 0.35
Other = 1.00
[l3_weights]
# Experimental-readiness profile: WTS evidence receives material weight.
event_confidence = 0.08
expression = 0.14
clonality = 0.07
tumor_specificity = 0.04
hla_binding = 0.16
hla_presentation = 0.20
rna_junction_support = 0.12
normal_tissue_safety = 0.05
apm_integrity = 0.05
immunogenicity = 0.09
[event_weights]
event_confidence = 0.22
event_expression = 0.20
driver_relevance = 0.18
clonality = 0.15
persistence = 0.15
tumor_specificity = 0.10
[presentation_weights]
netmhcpan_ba = 0.25
netmhcpan_el = 0.35
mhcflurry_presentation = 0.30
mhcflurry_processing = 0.10
[v03_score_weights]
event_score = 0.35
binding_evidence = 0.20
presentation_evidence = 0.25
immunogenicity = 0.15
evidence_completeness = 0.05
[safety]
hard_exclusion_critical_tissue_tpm = 10.0
caution_critical_tissue_tpm = 1.0
# Normal gene expression is contextual evidence, not proof that the mutant
# peptide is presented in normal tissue. Keep it as a review flag by itself.
critical_tissue_expression_action = "CAUTION"
normal_hspc_fail_tpm = 8.0
normal_hspc_caution_tpm = 2.0
# HPA single-cell HSPC values are nCPM, not TPM. These provisional thresholds
# are intentionally separate and must be recalibrated against validation data.
normal_hspc_fail_ncpm = 100.0
normal_hspc_caution_ncpm = 10.0
normal_hspc_expression_action = "CAUTION"
normal_hla_ligand_overlap_action = "CAUTION"
wildtype_strong_binding_rank = 0.5
self_similarity_caution = 0.85
partial_multiplier = 0.75
caution_multiplier = 0.85
partial_priority_cap = "C_CAUTION"
[mutant_specificity]
near_equal_el_rank_difference = 0.01
positive_agretopicity_ratio = 2.0
positive_el_rank_difference = 0.10
wt_better_multiplier = 0.55
similar_multiplier = 0.70
marginal_multiplier = 0.85
caution_priority_cap = "C_CAUTION"
non_mutant_multiplier = 0.0
non_mutant_priority_cap = "D"
[appm]
low_expression_tpm = 1.0
[appm_penalty]
b2m_damaging = 0.60
tap1_tap2_damaging = 0.35
hla_allele_loh = 0.50
nlrc5_low_expression = 0.25
ciita_low_expression = 0.35
ifng_pathway_damaging = 0.25
[ccf_lite]
enabled = true
clonal_threshold = 0.80
subclonal_threshold = 0.30
missing_ccf_multiplier = 0.65
rna_only_unresolved_multiplier = 0.85
subclonal_multiplier = 0.75
low_frequency_multiplier = 0.45
[scoring]
high_expression_tpm = 15.0

[gates]
enabled = true
require_presentation_grades = ["A", "B"]
max_el_rank = 2.0
min_stabpan_score = 1.4
min_event_expression_tpm = 1.0
min_tumor_vaf = 0.0
min_rna_alt_reads = 3
min_rna_vaf = 0.02
min_allele_expression = 0.5
min_rna_junction_reads = 3
failure_mode = "multiply"
failure_multiplier = 0.10

[immunogenicity]
enabled = true
sources = ["prime", "bigmhc_im"]
composite = "mean"
use_iedb_fallback = false

[immunogenicity.weights]
prime = 0.5
bigmhc_im = 0.5

[fusion]
# RNA-only fusion clonality remains unresolved. It can be reviewed but should
# not enter the first validation tier before DNA support and normal-junction QC.
rna_only_priority_cap = "C_CAUTION"
normal_junction_unassessed_priority_cap = "C_CAUTION"

[cross_platform]
# Evidence-aware WES/WGS comparison. Power-limited absence is not penalized.
common_multiplier = 1.00
low_level_support_multiplier = 1.00
sample_specific_multiplier = 0.85
sample_specific_multiplier_priority_cap = "C_CAUTION"
power_limited_multiplier = 1.00
coverage_unassessed_multiplier = 1.00
weak_other_support_multiplier = 0.90
weak_other_support_multiplier_priority_cap = "C_CAUTION"
source_unreproduced_multiplier = 0.50
source_unreproduced_multiplier_priority_cap = "C_CAUTION"
source_weak_multiplier = 0.75
source_weak_multiplier_priority_cap = "C_CAUTION"
normal_support_multiplier = 0.25
normal_support_multiplier_priority_cap = "D"
unassessed_multiplier = 1.00

[immune_escape]
therapy_context = "vaccine"
hla_loh_policy = "exclude_lost_hla_for_vaccine"
