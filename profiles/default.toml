[enabled_sources]
# Layer 1 mutation sources; legacy event_type values still accepted when enforce_enabled_sources=true
types = ["SNV", "InDel", "SV", "CNV", "Fusion", "Splice", "TAA"]
enforce_enabled_sources = false

[source_priority]
# Layer 1 priorities (preferred when mutation_source is set)
SNV = 1.00
InDel = 1.10
SV = 1.12
CNV = 0.95
TAA = 0.50
# Legacy Layer-2 / tool-specific keys (backward compatible)
Fusion = 1.15
Splice = 1.00
SV_Fusion = 1.15
SV_Frameshift = 1.10
Other = 1.00

[l3_weights]
# Layer 3 unified immunology scoring (Project B core)
event_confidence = 0.10
expression = 0.08
clonality = 0.07
tumor_specificity = 0.05
hla_binding = 0.20
hla_presentation = 0.25
rna_junction_support = 0.05
# normal_tissue_safety / apm_integrity are 0.0: these signals already act as
# independent multiplicative gates (safety_multiplier / appm_multiplier)
# applied after the L3 composite, so a nonzero weight here would double-count
# the same underlying value (scoring audit fix #1).
normal_tissue_safety = 0.0
apm_integrity = 0.0
immunogenicity = 0.15
[event_weights]
event_confidence = 0.22
event_expression = 0.20
driver_relevance = 0.18
clonality = 0.15
persistence = 0.15
tumor_specificity = 0.10
[presentation_weights]
netmhcpan_ba = 0.25
netmhcpan_el = 0.35
mhcflurry_presentation = 0.30
mhcflurry_processing = 0.10
[v03_score_weights]
event_score = 0.35
binding_evidence = 0.20
presentation_evidence = 0.25
immunogenicity = 0.15
evidence_completeness = 0.05
[safety]
hard_exclusion_critical_tissue_tpm = 10.0
caution_critical_tissue_tpm = 1.0
normal_hspc_fail_tpm = 8.0
normal_hspc_caution_tpm = 2.0
normal_hla_ligand_overlap_action = "CAUTION"
wildtype_strong_binding_rank = 0.5
self_similarity_caution = 0.85
[appm]
low_expression_tpm = 1.0
[appm_penalty]
b2m_damaging = 0.60
tap1_tap2_damaging = 0.35
hla_allele_loh = 0.50
nlrc5_low_expression = 0.25
ciita_low_expression = 0.35
ifng_pathway_damaging = 0.25
[ccf_lite]
enabled = true
clonal_threshold = 0.80
subclonal_threshold = 0.30
missing_ccf_multiplier = 0.65
subclonal_multiplier = 0.75
low_frequency_multiplier = 0.45
[scoring]
high_expression_tpm = 20.0

[gates]
enabled = true
require_presentation_grades = ["A", "B"]
max_el_rank = 2.0
min_stabpan_score = 1.4
min_event_expression_tpm = 0.0
min_tumor_vaf = 0.0
failure_mode = "multiply"
failure_multiplier = 0.25

[immunogenicity]
enabled = true
sources = ["prime", "bigmhc_im", "iedb"]
composite = "weighted"
use_iedb_fallback = false

[immunogenicity.weights]
bigmhc_im = 0.45
prime = 0.35
iedb = 0.20

# HLA-stratified source multipliers disabled (CEDAR ablation: hurts gated composite AUROC).
# Re-enable under [immunogenicity.hla_source_multipliers."HLA-..."] when retuned.

[driver_genes]
# Reference table for driver_relevance lookup (scoring audit fix #2).
# reference_path left unset -> falls back to resources/driver_genes.tsv.
enabled = true
unknown_gene_relevance = 0.3
# reference_path = "resources/driver_genes.tsv"

[immune_escape]
therapy_context = "vaccine"
hla_loh_policy = "exclude_lost_hla_for_vaccine"

# Escape-multiplier magnitudes (scoring audit fix #6). Previously these were
# Python literals in immune_escape.py; they are now read from here (with the
# same numeric values as fallback defaults if a key is missing), and
# appm_explainability.py's per-mechanism submodule scores are derived from
# this same table instead of maintaining a second, independently hardcoded
# and inconsistent set of numbers.
[immune_escape.multipliers]
hla_lost_strict = 0.0
hla_lost_lenient = 0.35
b2m_biallelic_loss = 0.0
tap_defect = 0.35
nlrc5_defect = 0.70
ciita_defect = 0.40
jak_stat_defect = 0.60
# The remaining keys below are specific to the finer-grained per-mechanism
# submodule scores in appm_explainability.py (biallelic loss of the HLA
# locus genes themselves, and "functional caution" -- reduced but not
# biallelic-lost -- states) and have no direct counterpart above; they used
# to be a second, independently hardcoded and inconsistent set of numbers,
# now sourced from this same table (scoring audit fix #6).
hla_locus_biallelic_single = 0.70
hla_locus_biallelic_multi = 0.40
hla_loh_single_allele = 0.70
hla_loh_multi_allele = 0.45
core_caution_penalty = 0.75
processing_caution_penalty = 0.75
regulation_caution_penalty = 0.65
mhc_ii_caution_penalty = 0.65
ifng_caution_penalty = 0.65

[immune_escape.priority_caps]
hla_lost_strict = "D"
hla_lost_lenient = "C_CAUTION"
b2m_biallelic_loss = "D"
tap_defect = "C"
nlrc5_defect = "B_CAUTION"
ciita_defect = "C"
jak_stat_defect = "B_CAUTION"
