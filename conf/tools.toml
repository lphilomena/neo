dir = "${FACETS_HOME:-}"
entries = ["snv_indel", "fusion", "splice_junction", "sv_wgs", "sv_wes", "peptide_only"]
optional = true

[ascat]
check = "env"
env_var = "NEOAG_ASCAT_ENV"
entries = ["snv_indel", "fusion", "splice_junction", "sv_wgs", "sv_wes", "peptide_only"]
optional = true

[ascat_v3]
check = "env"
env_var = "NEOAG_ASCAT_V3_ENV"
entries = ["snv_indel", "fusion", "splice_junction", "sv_wgs", "sv_wes", "peptide_only"]
optional = true

[pyclone]
check = "env"
env_var = "NEOAG_PYCLONE_ENV"
entries = ["snv_indel", "fusion", "splice_junction", "sv_wgs", "sv_wes", "peptide_only"]
