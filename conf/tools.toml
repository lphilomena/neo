# ---- Reference data ---------------------------------------------------------

[reference]
check = "dir"
dir = "${NEOAG_SHARED_REF_DIR:-}"
entries = ["snv_indel", "fusion", "splice_junction", "sv_wgs", "sv_wes", "peptide_only"]
optional = true

[reference_fasta]
check = "file"
file = "${NEOAG_REFERENCE_FASTA:-}"
entries = ["snv_indel", "splice_junction", "sv_wgs", "sv_wes"]
optional = true

[dbsnp]
# used by GATK Mutect2 (snv-call-wes) and by FACETS.
check = "file"
file = "${NEOAG_DBSNP_VCF:-}"
entries = ["snv_indel"]
optional = true
