# NeoAg — individual case (known VCF + known HLA, no re-typing / no re-calling)

[sample]
id = "yumin"
profile = "default"

[tools]
stub = false
enabled = ["pvacseq", "netmhcpan", "mhcflurry", "vep"]

[inputs]
# --- Known HLA typing results ---
hla_alleles = ["HLA-A*03:01", "HLA-A*24:02", "HLA-B*07:02", "HLA-B*51:01", "HLA-C*07:02", "HLA-C*14:02"]

entry_mode = "snv_indel"

# --- Known somatic VCF (already filtered) ---
tumor_vcf = "/mnt/zjl-bgi-zzb/peixunban/gl/data/chenxiaoliang_data/dsrct_data/dsrct/yumin/somatic-vcf/yumin_tumor.somatic.pass.vcf.gz"
variants_vcf = "/mnt/zjl-bgi-zzb/peixunban/gl/data/chenxiaoliang_data/dsrct_data/dsrct/yumin/somatic-vcf/yumin_tumor.somatic.pass.vcf.gz"
tumor_sample_name = "yumin_tumor"
normal_sample_name = "yumin_blood"
extract_appm_from_vcf = true

# --- Reference genome ---
reference_fasta = "/mnt/zjl-bgi-zzb/peixunban/gl/data/reference/Homo_sapiens.GRCh38.dna.primary_assembly.chr.fa"

# --- Expression / CNV / Normal controls ---
expression = "data/fixtures/gene_expression.tsv"
cnv = "data/fixtures/cnv_segments.tsv"
normal_expression = "resources/normal_expression.example.tsv"
normal_hla_ligands = "resources/normal_hla_ligands.example.tsv"
