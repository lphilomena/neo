bwa:
  mode: container
  image: biocontainers/bwa:latest
  executable: bwa

star:
  mode: container
  image: biocontainers/star:latest
  executable: STAR

vep:
  mode: apptainer
  image: neoag-vep.sif
  executable: vep

netmhcpan:
  mode: local_license
  path: /opt/netMHCpan/bin/netMHCpan
  executable: netMHCpan
  license_required: true

netmhcstabpan:
  mode: local_license
  path: /opt/netMHCstabpan/bin/NetMHCstabpan
  executable: NetMHCstabpan
  license_required: true

mhcflurry:
  mode: conda
  executable: mhcflurry-predict

lohhla:
