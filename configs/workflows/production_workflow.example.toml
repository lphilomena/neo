# Copy this file to a private path and replace every sample-specific path.
# Run a plan first:
#   neoag-production-run --manifest configs/workflows/production_workflow.private.toml
# Execute and resume automatically from existing declared outputs:
#   neoag-production-run --manifest configs/workflows/production_workflow.private.toml --execute

[run]
sample_id = "SAMPLE001"
profile = "default"
outdir = "results/SAMPLE001_production"
hla_file = "results/SAMPLE001_production/hla/hla_consensus.txt"
tools_stub = false
immunogenicity_stub = false
expected_peptide_sources = ["pVACseq", "pVACfuse", "pVACsplice"]
presentation_predictors = ["netmhcpan", "mhcflurry"]
required_presentation_predictors = ["netmhcpan", "mhcflurry"]

# Each command is site-editable. Empty commands reuse precomputed outputs.
# Required stages stop on failure. Optional stages continue as LOW_CONFIDENCE.

[stages.hla_typing]
required = true
command = ""
[stages.hla_typing.outputs]
hla_file = "{outdir}/hla/hla_consensus.txt"

[stages.purity_cnv]
required = false
command = "PATIENT_ID={sample_id} TUMOR_BAM=/path/tumor.bam NORMAL_BAM=/path/normal.bam OUTDIR={outdir}/facets bash scripts/run_facets_sample.sh"
[stages.purity_cnv.outputs]
purity = "{outdir}/evidence/purity.tsv"
cnv = "{outdir}/evidence/cnv_segments.tsv"

[stages.hla_loh]
required = false
depends_on = ["hla_typing", "purity_cnv"]
command = "PATIENT_ID={sample_id} TUMOR_BAM=/path/tumor.bam NORMAL_BAM=/path/normal.bam HLA_FILE={outdir}/hla/hla_consensus.txt OUTDIR={outdir}/lohhla bash scripts/run_lohhla_sample.sh"
[stages.hla_loh.outputs]
hla_loh = "{outdir}/evidence/hla_loh.tsv"

[stages.rna_expression]
required = false
command = "bash scripts/run_salmon_fastq_to_tpm.sh --fastq1 /path/R1.fastq.gz --fastq2 /path/R2.fastq.gz --sample-id {sample_id} --outdir {outdir}/rna/salmon"
[stages.rna_expression.outputs]
expression = "{outdir}/evidence/gene_expression.tsv"
transcript_expression = "{outdir}/rna/salmon/quant.sf"

[stages.snv]
required = true
source = "pVACseq"
depends_on = ["hla_typing"]
command = ""
[stages.snv.outputs]
pvac_file = "{outdir}/branches/snv/pvacseq_aggregated.tsv"

[stages.fusion_discovery]
required = false
depends_on = ["rna_expression"]
command = "PATIENT_ID={sample_id} INPUT_BAM=/path/rna.bam OUTDIR={outdir}/branches/fusion/arriba bash scripts/run_arriba_sample.sh"
[stages.fusion_discovery.outputs]
fusion_tsv = "{outdir}/branches/fusion/arriba/{sample_id}.fusions.tsv"

[stages.fusion_peptides]
required = false
source = "pVACfuse"
depends_on = ["hla_typing", "fusion_discovery"]
command = ""
[stages.fusion_peptides.outputs]
pvac_file = "{outdir}/branches/fusion/pvacfuse_aggregated.tsv"

[stages.splice_discovery]
required = false
depends_on = ["rna_expression"]
command = ""
[stages.splice_discovery.outputs]
junctions = "{outdir}/branches/splice/regtools_junctions.tsv"

[stages.splice_peptides]
required = false
source = "pVACsplice"
depends_on = ["hla_typing", "splice_discovery"]
command = "bash scripts/run_pvacsplice_sample.sh --junctions {outdir}/branches/splice/regtools_junctions.tsv --annotated-vcf /path/vep.annotated.vcf.gz --sample-id {sample_id} --hla HLA-A*02:01,HLA-B*07:02 --outdir {outdir}/branches/splice/pvacsplice --ref-fasta /path/GRCh38.fa --gtf /path/gencode.gtf"
[stages.splice_peptides.outputs]
pvac_file = "{outdir}/branches/splice/pvacsplice_aggregated.tsv"

# Evidence files are passed to the final unified ranking when they exist.
# They can be generated by stages above or supplied from prior runs.
[evidence]
vep_appm = "{outdir}/evidence/vep_appm.tsv"
expression = "{outdir}/evidence/gene_expression.tsv"
rna_junction_tsv = "{outdir}/evidence/rna_junction_support.tsv"
purity = "{outdir}/evidence/purity.tsv"
cnv = "{outdir}/evidence/cnv_segments.tsv"
hla_loh = "{outdir}/evidence/hla_loh.tsv"
normal_expression = "resources/normal_expression.example.tsv"
normal_hla_ligands = "resources/normal_hla_ligands.example.tsv"
