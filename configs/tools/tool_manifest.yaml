manifest_version: 1
created_at: 2026-07-17
owner: neoag
policy:
  standard_profile: "Install open tools and sync required production assets; licensed tools are installed only when licensed assets are present."
  download_policy: "Network downloads require --allow-download and official/user-approved URLs. License-protected tools are never auto-downloaded from unofficial mirrors."

tools:
  deepimmuno:
    category: immunogenicity
    install_profile: standard
    install_mode: asset_or_official_git
    executable: deepimmuno-cnn.py
    asset: deepimmuno_source
    target_path: /root/neo/env_tool/tools/DeepImmuno
    required_markers:
      - deepimmuno-cnn.py
      - data/after_pca.txt
      - data/hla2paratopeTable_aligned.txt
      - models/cnn_model_331_3_7
    license_required: false
    status_policy: required_for_full_immunogenicity

  arriba:
    category: fusion
    install_profile: standard
    install_mode: conda
    conda_env: neoag-fusion
    executable: arriba
    wrapper: /root/neo/src/na0707_upload_release/bin/arriba
    license_required: false
    status_policy: required_for_fusion_workflows

  netmhcpan:
    category: presentation
    install_profile: licensed
    install_mode: licensed_asset_or_user_supplied_archive
    executable: netMHCpan
    asset: netmhcpan_install
    target_path: /root/neo/licensed_tools/netMHCpan
    required_markers:
      - netMHCpan
      - data
    license_required: true
    source_policy: "Use institutional/local DTU package or registered DTU download only."
    status_policy: optional_but_recommended_for_binding_crosscheck

  netmhcstabpan:
    category: presentation
    install_profile: optional
    install_mode: licensed_asset_or_iedb_shim
    executable: netMHCstabpan
    asset: netmhcstabpan_install
    target_path: /root/neo/licensed_tools/netMHCstabpan
    required_markers:
      - netMHCstabpan
    license_required: true
    status_policy: optional_stability_score

  polysolver:
    category: hla
    install_profile: licensed
    install_mode: licensed_asset
    asset: polysolver_distribution
    target_path: /root/neo/licensed_tools/polysolver
    license_required: true
    companion_assets:
      - novoalign_license
    status_policy: optional_hla_typing_legacy

  novoalign_license:
    category: hla
    install_profile: licensed
    install_mode: license_file
    asset: novoalign_license
    target_path: /root/neo/licensed_tools/novoalign/novoalign.lic
    license_required: true
    status_policy: required_only_for_polysolver_novoalign
