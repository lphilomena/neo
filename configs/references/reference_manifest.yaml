manifest_version: 1
genome_build: GRCh38
created_at: 2026-07-16
owner: neoag

references:
  reference_fasta:
    path: /root/neo/neodata4git/data/ref/hg38/Homo_sapiens_assembly38.fasta
    source: Ensembl/EasyFuse reference bundle
    version: GRCh38.110
    sha256: "-"
    marker: .fai
    required: true

  gencode_gtf:
    path: /root/neo/neodata4git/data/ref/hg38/gencode.gtf
    source: Ensembl/EasyFuse reference bundle
    version: GRCh38.110
    sha256: "-"
    required: true

  vep_cache:
    path: /root/neo/neodata4git/data/vep/homo_sapiens/105_GRCh38
    source: Ensembl VEP
    version: 105_GRCh38
    vep_version_required: "105"
    marker: info.txt
    required: true

  bigmhc_models:
    path: /root/neo/env_tool/tools/bigmhc/models
    source: BigMHC
    version: project_default
    marker: bat512/im
    required: true

  easyfuse_ref:
    path: /root/neo/neodata4git/data/easyfuse/easyfuse_ref_v4
    source: EasyFuse
    version: v4
    marker: BEFORE_EXECUTING_EASYFUSE
    required: false

  hla_la_graph:
    path: /root/neo/neodata4git/data/hla/PRG_MHC_GRCh38_withIMGT
    source: HLA-LA graph bundle
    version: PRG_MHC_GRCh38_withIMGT
    marker: serializedGRAPH
    required: false

  facets_common_snp_vcf:
    path: /root/neo/neodata4git/data/facets/reference/common_snp.hg38.vcf.gz
    source: FACETS common SNP reference
    version: hg38
    marker: .tbi
    required: true

  normal_proteome:
    path: /root/neo/neodata4git/data/normal/proteome/Homo_sapiens.GRCh38.pep.all.fa
    source: Ensembl peptide reference
    version: GRCh38.110
    required: true

  normal_ligandome:
    path: /root/neo/neodata4git/data/normal/ligandome/normal_ms_ligands.tsv
    source: HLA Ligand Atlas
    version: 2020.12 peptide_only
    required: true

  salmon_index:
    path: /root/neo/neodata4git/data/rna/salmon_index
    source: transcriptome Salmon index
    version: GRCh38_matching_project_gtf
    marker: versionInfo.json
    required: false

  salmon_tx2gene:
    path: /root/neo/neodata4git/data/rna/tx2gene.tsv
    source: transcript-to-gene mapping
    version: GRCh38_matching_project_gtf
    required: false

  rsem_reference:
    path: /root/neo/neodata4git/data/rna/rsem_reference
    source: RSEM reference prefix directory
    version: GRCh38_matching_project_gtf
    marker: grp
    required: false
